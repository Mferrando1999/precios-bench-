name: Update product prices

on:
  workflow_dispatch:
    inputs:
      week:
        description: "Week number to update (e.g. 8)"
        required: true
        default: "8"
  schedule:
    - cron: "0 7 1,16 * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests beautifulsoup4 lxml

      - name: Run updater
        run: |
          python actualiza_precios.py \
            --input "bench automatizacion.xlsx" \
            --output "bench automatizacion_actualizado.xlsx" \
            --week "${{ github.event.inputs.week || '8' }}"

      - name: Commit updated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "bench automatizacion_actualizado.xlsx"
          git commit -m "Update prices (week ${{ github.event.inputs.week || '8' }})" || echo "No changes to commit"
          git push
